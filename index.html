<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestDeals — Curated Amazon Affiliate Products</title>
    <meta name="description" content="Discover handpicked Amazon deals at the best prices — electronics, fashion, home, books, sports and more.">
    <meta name="theme-color" content="#6366F1">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="BestDeals — Curated Amazon Deals">
    <meta property="og:description" content="Discover handpicked Amazon deals at the best prices — electronics, fashion, home and more.">
    <meta property="og:image" content="icon-512.png">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BestDeals — Curated Amazon Deals">
    <meta name="twitter:description" content="Discover handpicked Amazon deals at the best prices.">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- JSON-LD structured data (injected by script.js) -->
    <script type="application/ld+json" id="jsonld-store"></script>
</head>
<body>

<!-- ── Affiliate Disclosure Banner ──────────────── -->
<div class="disclosure-banner" id="disclosureBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span><strong>Affiliate Disclosure:</strong> As an Amazon Associate we earn from qualifying purchases at no extra cost to you.</span>
    <button class="disclosure-close" onclick="document.getElementById('disclosureBanner').style.display='none'" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
</div>

<div class="app">

    <!-- ══════════════ LEFT PANEL ══════════════ -->
    <aside class="left-panel" id="leftPanel">

        <!-- Floating blobs -->
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="blob b4"></div>
        <div class="blob b5"></div>

        <!-- Top: brand + actions -->
        <div class="lp-top">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                </div>
                <div class="brand-name">Best<span>Deals</span></div>
            </div>
            <div class="lp-top-actions">
                <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode" aria-label="Toggle dark mode">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <a href="admin.html" class="admin-link" title="Admin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Center: category showcase -->
        <div class="lp-center">
            <div class="cat-big-icon" id="catBigIcon"></div>
            <div class="cat-big-label" id="catBigLabel">All Products</div>
            <div class="cat-big-count" id="catBigCount">0 products</div>
        </div>

        <!-- Bottom: category pills -->
        <div class="lp-bottom">
            <div class="cat-pills" id="catPills"><!-- Dynamically generated --></div>
        </div>

    </aside>

    <!-- ══════════════ RIGHT PANEL ══════════════ -->
    <main class="right-panel">

        <!-- Header -->
        <div class="rp-header">
            <div class="rp-title-wrap">
                <h2 class="rp-title" id="rpTitle">Featured Deals</h2>
                <span class="rp-badge" id="rpBadge">0 items</span>
            </div>
            <div class="rp-controls">
                <!-- Search -->
                <div class="search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input class="search-input" id="searchInput" type="text" placeholder="Search products…" oninput="onSearch(this.value)" autocomplete="off">
                    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none" aria-label="Clear search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <!-- Sort -->
                <select class="sort-select" id="sortSelect" onchange="onSort(this.value)" aria-label="Sort products">
                    <option value="featured">Featured</option>
                    <option value="newest">Newest</option>
                    <option value="price-asc">Price ↑</option>
                    <option value="price-desc">Price ↓</option>
                </select>
                <!-- Nav -->
                <div class="rp-nav">
                    <button class="rp-nav-btn" id="prevBtn" aria-label="Previous">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <span class="rp-page" id="rpPage">1 / 1</span>
                    <button class="rp-nav-btn" id="nextBtn" aria-label="Next">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Carousel viewport -->
        <div class="carousel-viewport">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
            </div>
            <p>No products found. Try a different search or category.</p>
        </div>

        <!-- Footer: dots + share -->
        <div class="rp-footer">
            <div class="carousel-dots" id="carouselDots"></div>
            <button class="share-btn" onclick="shareOnFacebook()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Share
            </button>
        </div>

    </main>

</div>

<!-- ══ PRODUCT DETAIL MODAL ═════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)" role="dialog" aria-modal="true" aria-label="Product details">
    <div class="modal-box" id="modalBox">
        <button class="modal-close" onclick="closeModal()" aria-label="Close modal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <!-- Content injected by openModal() -->
    </div>
</div>

<!-- ══ COOKIE CONSENT ════════════════════════════ -->
<div class="cookie-bar" id="cookieBar">
    <div class="cookie-text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span>We use cookies to improve your experience and track affiliate referrals.</span>
    </div>
    <div class="cookie-actions">
        <button class="cookie-decline" onclick="declineCookies()">Decline</button>
        <button class="cookie-accept" onclick="acceptCookies()">Accept</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
