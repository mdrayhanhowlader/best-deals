<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestDeals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- ══════════════ LEFT PANEL ══════════════ -->
    <aside class="left-panel" id="leftPanel">

        <!-- Floating blobs -->
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="blob b4"></div>
        <div class="blob b5"></div>

        <!-- Top: brand + admin -->
        <div class="lp-top">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                </div>
                <div class="brand-name">Best<span>Deals</span></div>
            </div>
            <a href="admin.html" class="admin-link" title="Admin">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
            </a>
        </div>

        <!-- Center: category showcase -->
        <div class="lp-center">
            <div class="cat-big-icon" id="catBigIcon">
                <!-- Injected by JS -->
            </div>
            <div class="cat-big-label" id="catBigLabel">All Products</div>
            <div class="cat-big-count" id="catBigCount">0 products</div>
        </div>

        <!-- Bottom: category selector pills -->
        <div class="lp-bottom">
            <div class="cat-pills" id="catPills">
                <!-- Dynamically generated by script.js from localStorage categories -->
            </div>
        </div>

    </aside>

    <!-- ══════════════ RIGHT PANEL ══════════════ -->
    <main class="right-panel">

        <!-- Header -->
        <div class="rp-header">
            <div class="rp-title-wrap">
                <h2 class="rp-title" id="rpTitle">Featured Deals</h2>
                <span class="rp-badge" id="rpBadge">0 items</span>
            </div>
            <div class="rp-nav">
                <button class="rp-nav-btn" id="prevBtn" aria-label="Previous">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <span class="rp-page" id="rpPage">1 / 1</span>
                <button class="rp-nav-btn" id="nextBtn" aria-label="Next">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Carousel viewport -->
        <div class="carousel-viewport">
            <div class="carousel-track" id="carouselTrack">
                <!-- Pages of cards injected by JS -->
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
            </div>
            <p>Products coming soon. Check back later!</p>
        </div>

        <!-- Footer: dots + share -->
        <div class="rp-footer">
            <div class="carousel-dots" id="carouselDots"></div>
            <button class="share-btn" onclick="shareOnFacebook()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Share
            </button>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
